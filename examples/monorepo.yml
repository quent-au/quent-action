# Example: Monorepo with Multiple Apps
# For monorepos using tools like Turborepo, Nx, or Lerna

name: Quent AI Tests

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  quent-test-web:
    if: contains(github.event.pull_request.labels.*.name, 'quent')
    runs-on: ubuntu-latest
    name: Web App Tests
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Shared Packages
        run: npm run build --workspace=packages/shared

      - name: Run Quent Tests - Web App
        uses: quent-ai/quent-action@v1
        with:
          quent-api-key: ${{ secrets.QUENT_API_KEY }}
          project-id: ${{ secrets.QUENT_PROJECT_ID_WEB }}
          base-url: 'http://localhost:3000'
          start-command: 'npm run dev --workspace=apps/web'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quent-test-admin:
    if: contains(github.event.pull_request.labels.*.name, 'quent')
    runs-on: ubuntu-latest
    name: Admin Dashboard Tests
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Shared Packages
        run: npm run build --workspace=packages/shared

      - name: Run Quent Tests - Admin Dashboard
        uses: quent-ai/quent-action@v1
        with:
          quent-api-key: ${{ secrets.QUENT_API_KEY }}
          project-id: ${{ secrets.QUENT_PROJECT_ID_ADMIN }}
          base-url: 'http://localhost:3001'
          start-command: 'npm run dev --workspace=apps/admin'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



