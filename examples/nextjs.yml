# Example: Next.js Application
# For Next.js apps with npm/yarn

name: Quent AI Tests

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  quent-test:
    if: contains(github.event.pull_request.labels.*.name, 'quent')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build

      - name: Run Quent Tests
        uses: quent-ai/quent-action@v1
        with:
          quent-api-key: ${{ secrets.QUENT_API_KEY }}
          project-id: ${{ secrets.QUENT_PROJECT_ID }}
          base-url: 'http://localhost:3000'
          start-command: 'npm run start'
          wait-on-timeout: '180'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



